server.port=8080
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smartcampusdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=ThisIsAVerySecureDemoSecretKeyForSmartCampus2026Project
app.jwt.expiration-ms=86400000
app.frontend.url=http://localhost:5173

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:demo-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:demo-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

logging.level.org.springframework.security=INFO
