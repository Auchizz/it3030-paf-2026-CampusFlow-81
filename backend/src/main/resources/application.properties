server.port=8080
spring.datasource.url=jdbc:h2:file:./data/smartcampusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=ThisIsAVerySecureDemoSecretKeyForSmartCampus2026Project
app.jwt.expiration-ms=86400000
app.frontend.url=http://localhost:5173

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:demo-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:demo-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

logging.level.org.springframework.security=INFO
